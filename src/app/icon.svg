<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="tealGradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <filter id="shadowIcon" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0d9488" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g transform="translate(10, 10)">
    <!-- 360 Arc outside -->
    <circle cx="40" cy="40" r="32" fill="none" stroke="url(#tealGradIcon)" stroke-width="8" stroke-dasharray="140 40" stroke-linecap="round" transform="rotate(-45 40 40)" filter="url(#shadowIcon)" />
    <!-- Dynamic dot indicating movement/360 -->
    <circle cx="68" cy="18" r="6" fill="#2dd4bf" />
    
    <!-- Health Cross Inside -->
    <path d="M35 25 h10 v10 h10 v10 h-10 v10 h-10 v-10 h-10 v-10 h10 z" fill="url(#tealGradIcon)" />
  </g>
</svg>
