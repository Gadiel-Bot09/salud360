<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0d9488" flood-opacity="0.2"/>
    </filter>
  </defs>

  <g transform="translate(20, 20)">
    <!-- 360 Arc outside -->
    <circle cx="40" cy="40" r="32" fill="none" stroke="url(#tealGrad)" stroke-width="8" stroke-dasharray="140 40" stroke-linecap="round" transform="rotate(-45 40 40)" filter="url(#shadow)" />
    <!-- Dynamic dot indicating movement/360 -->
    <circle cx="68" cy="18" r="6" fill="#2dd4bf" />
    
    <!-- Health Cross Inside -->
    <path d="M35 25 h10 v10 h10 v10 h-10 v10 h-10 v-10 h-10 v-10 h10 z" fill="url(#tealGrad)" />
  </g>
  
  <text x="120" y="76" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="56" letter-spacing="-1.5">
    <tspan fill="url(#darkGrad)">Salud</tspan><tspan fill="url(#tealGrad)">360</tspan>
  </text>
  <text x="122" y="98" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="14" fill="#64748b" letter-spacing="3.5">
    PLATAFORMA SAAS
  </text>
</svg>
